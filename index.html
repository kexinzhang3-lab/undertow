<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"/>
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="暗流"/>
<link rel="apple-touch-icon" href="icon.png"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="theme-color" content="#020810"/>
<title>暗流 · Undertow</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&family=Noto+Serif+SC:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
/* ─── RESET & BASE ─────────────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
::-webkit-scrollbar{display:none}
html{height:100%;overflow:hidden}
body{
  height:100%;
  width:100%;
  overflow:hidden;
  background:#020810;
  color:rgba(200,225,255,0.85);
  font-family:'Noto Serif SC','Noto Serif',serif;
  font-weight:300;
  -webkit-font-smoothing:antialiased;
  position:relative;
  cursor:default;
  user-select:none;
}
/* ─── CANVAS BACKGROUND ────────────────────────────────────── */
#waterCanvas{
  position:fixed;
  inset:0;
  width:100%;
  height:100%;
  z-index:0;
  pointer-events:none;
}
/* ─── GRAIN OVERLAY ────────────────────────────────────────── */
.grain{
  position:fixed;
  inset:-50%;
  width:200%;
  height:200%;
  z-index:1;
  pointer-events:none;
  opacity:0.028;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
  animation:grainShift 0.4s steps(1) infinite;
}
@keyframes grainShift{
  0%{transform:translate(0,0)}
  25%{transform:translate(-2%,-1%)}
  50%{transform:translate(1%,2%)}
  75%{transform:translate(-1%,1%)}
  100%{transform:translate(2%,-2%)}
}
/* ─── SCREENS ──────────────────────────────────────────────── */
.screen{
  position:fixed;
  inset:0;
  z-index:10;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  transition:opacity 0.9s cubic-bezier(0.4,0,0.2,1),transform 0.9s cubic-bezier(0.4,0,0.2,1);
}
.screen.hidden{
  opacity:0;
  pointer-events:none;
  transform:translateY(12px);
}
/* ─── INTRO SCREEN ─────────────────────────────────────────── */
#introScreen{
  padding:2rem;
  gap:0;
}
.intro-star{
  width:48px;
  height:48px;
  margin-bottom:2.8rem;
  opacity:0;
  animation:starReveal 2s ease 0.6s forwards;
}
@keyframes starReveal{
  to{opacity:1}
}
.intro-wordmark{
  font-family:'IM Fell English',serif;
  font-size:clamp(2rem,6vw,3rem);
  font-weight:400;
  letter-spacing:0.35em;
  color:rgba(210,235,255,0.92);
  text-transform:uppercase;
  opacity:0;
  animation:fadeUp 1.4s ease 1s forwards;
  margin-bottom:0.5rem;
}
.intro-zh{
  font-size:clamp(0.75rem,2vw,0.88rem);
  letter-spacing:0.55em;
  color:rgba(130,175,230,0.55);
  opacity:0;
  animation:fadeUp 1.4s ease 1.3s forwards;
  margin-bottom:3.5rem;
}
.intro-tagline{
  max-width:420px;
  text-align:center;
  font-size:clamp(0.82rem,2.2vw,0.96rem);
  line-height:2.1;
  color:rgba(170,210,250,0.65);
  letter-spacing:0.04em;
  opacity:0;
  animation:fadeUp 1.4s ease 1.7s forwards;
  margin-bottom:3.8rem;
}
.intro-tagline em{
  font-style:normal;
  color:rgba(180,220,255,0.85);
}
.intro-begin{
  opacity:0;
  animation:fadeUp 1.4s ease 2.2s forwards;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:1rem;
}
.btn-begin{
  background:transparent;
  border:1px solid rgba(100,160,230,0.35);
  color:rgba(170,210,250,0.8);
  font-family:'Noto Serif SC',serif;
  font-size:0.88rem;
  letter-spacing:0.25em;
  padding:0.85rem 2.8rem;
  border-radius:100px;
  cursor:pointer;
  transition:all 0.4s ease;
  box-shadow:0 0 20px rgba(60,120,220,0.08);
}
.btn-begin:hover{
  border-color:rgba(120,180,255,0.6);
  color:rgba(200,230,255,0.95);
  box-shadow:0 0 35px rgba(60,120,220,0.2);
}
.intro-note{
  font-size:0.72rem;
  color:rgba(100,150,210,0.4);
  letter-spacing:0.12em;
}
@keyframes fadeUp{
  from{opacity:0;transform:translateY(14px)}
  to{opacity:1;transform:translateY(0)}
}
/* ─── MAIN APP SCREEN ──────────────────────────────────────── */
#appScreen{
  align-items:stretch;
  justify-content:stretch;
  padding:0;
}
/* ─── TOP BAR ──────────────────────────────────────────────── */
.topbar{
  position:fixed;
  top:0;
  left:0;
  right:0;
  z-index:50;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:max(1rem,env(safe-area-inset-top)) 1.2rem 0.8rem;
  background:linear-gradient(to bottom,rgba(2,8,16,0.7) 0%,transparent 100%);
  pointer-events:none;
}
.topbar-left,.topbar-right{
  display:flex;
  align-items:center;
  gap:0.6rem;
  pointer-events:auto;
}
.day-badge{
  font-size:0.72rem;
  letter-spacing:0.18em;
  color:rgba(120,170,230,0.55);
  padding:0.3rem 0.8rem;
  border:1px solid rgba(80,130,200,0.18);
  border-radius:100px;
  background:rgba(5,15,35,0.5);
  backdrop-filter:blur(12px);
}
.topbar-btn{
  background:rgba(5,15,35,0.5);
  backdrop-filter:blur(12px);
  border:1px solid rgba(80,130,200,0.18);
  color:rgba(150,195,245,0.7);
  font-family:inherit;
  font-size:0.72rem;
  letter-spacing:0.15em;
  padding:0.3rem 0.85rem;
  border-radius:100px;
  cursor:pointer;
  transition:all 0.3s ease;
}
.topbar-btn:hover{
  border-color:rgba(100,160,240,0.35);
  color:rgba(180,220,255,0.9);
}
/* ─── LAYOUT ───────────────────────────────────────────────── */
.app-layout{
  display:grid;
  grid-template-columns:280px 1fr;
  height:100%;
  width:100%;
  gap:0.75rem;
  padding:4.5rem 0.75rem calc(7.5rem + env(safe-area-inset-bottom)) 0.75rem;
}
/* ─── SIDEBAR ──────────────────────────────────────────────── */
#sidebar{
  background:rgba(4,12,28,0.5);
  backdrop-filter:blur(24px) saturate(160%);
  border:1px solid rgba(80,130,200,0.14);
  border-radius:20px;
  overflow-y:auto;
  padding:1.2rem 1rem;
  display:flex;
  flex-direction:column;
  gap:0.6rem;
}
.sidebar-tools {
  margin-top: auto;
  padding-top: 0.8rem;
  border-top: 1px solid rgba(80, 130, 200, 0.1);
  display: flex;
  flex-direction: column;
  gap: 0.35rem;
}

.sidebar-tool-btn {
  display: flex;
  align-items: center;
  gap: 0.6rem;
  background: transparent;
  border: 1px solid transparent;
  border-radius: 10px;
  padding: 0.55rem 0.7rem;
  cursor: pointer;
  transition: all 0.25s ease;
  text-align: left;
  width: 100%;
}
.sidebar-tool-btn:hover:not(:disabled) {
  background: rgba(8, 20, 50, 0.5);
  border-color: rgba(80, 130, 200, 0.15);
}
.sidebar-tool-btn:disabled {
  opacity: 0.3;
  cursor: not-allowed;
}

.tool-icon {
  font-size: 0.8rem;
  color: rgba(100, 155, 230, 0.5);
  flex-shrink: 0;
  width: 16px;
  text-align: center;
}

.tool-label {
  font-size: 0.75rem;
  letter-spacing: 0.12em;
  color: rgba(140, 190, 255, 0.6);
  font-family: 'Noto Serif SC', serif;
}
.sidebar-title{
  font-size:0.68rem;
  letter-spacing:0.28em;
  color:rgba(100,150,220,0.45);
  margin-bottom:0.4rem;
  padding:0 0.2rem;
}
.history-card{
  background:rgba(10,24,52,0.66);
  border:1px solid rgba(88,142,214,0.2);
  border-radius:14px;
  padding:0.75rem 0.85rem;
  cursor:pointer;
  transition:all 0.3s ease;
}
.history-card:hover{
  border-color:rgba(108,170,246,0.36);
  background:rgba(14,32,68,0.78);
}
.history-card.is-past{
  background:rgba(7,18,40,0.62);
  border-color:rgba(78,126,196,0.17);
}
.history-card.active{
  border-color:rgba(110,175,255,0.42);
  background:rgba(14,32,70,0.72);
  box-shadow:0 0 0 1px rgba(120,185,255,0.15) inset;
}
.hc-day{
  font-size:0.68rem;
  letter-spacing:0.2em;
  color:rgba(132,186,246,0.86);
  margin-bottom:0.3rem;
}
.hc-snippet{
  font-size:0.82rem;
  line-height:1.65;
  color:rgba(194,228,255,0.9);
}
.hc-signal{
  margin-top:0.35rem;
  font-size:0.7rem;
  color:rgba(122,176,238,0.72);
  font-style:italic;
}
.history-card.is-past .hc-day{
  color:rgba(112,166,228,0.72);
}
.history-card.is-past .hc-snippet{
  color:rgba(170,208,242,0.8);
}
.history-card.is-past .hc-signal{
  color:rgba(104,156,220,0.62);
}
.sidebar-empty{
  font-size:0.82rem;
  color:rgba(100,150,220,0.35);
  text-align:center;
  padding:2rem 0;
  line-height:1.8;
}
/* ─── CHAT AREA ────────────────────────────────────────────── */
#chatArea{
  background:rgba(4,12,28,0.45);
  backdrop-filter:blur(24px) saturate(160%);
  border:1px solid rgba(80,130,200,0.14);
  border-radius:20px;
  overflow-y:auto;
  padding:1.5rem 1.8rem;
  display:flex;
  flex-direction:column;
  gap:1.4rem;
  scroll-behavior:smooth;
}
/* Welcome state */
.chat-welcome{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  height:100%;
  gap:1rem;
  opacity:0.55;
  text-align:center;
}
.chat-welcome-star{
  width:28px;
  height:28px;
  opacity:0.6;
  animation:starPulse 4s ease-in-out infinite;
}
.chat-welcome-text{
  font-size:0.85rem;
  line-height:2;
  color:rgba(140,185,240,0.7);
  letter-spacing:0.06em;
}
/* Messages */
.msg{
  display:flex;
  flex-direction:column;
  max-width:85%;
  opacity:0;
  animation:msgIn 0.5s ease forwards;
}
.msg.user{
  align-self:flex-end;
  align-items:flex-end;
}
.msg.ai{
  align-self:flex-start;
  align-items:flex-start;
}
@keyframes msgIn{
  from{opacity:0;transform:translateY(8px)}
  to{opacity:1;transform:translateY(0)}
}
.msg-label{
  font-size:0.65rem;
  letter-spacing:0.2em;
  margin-bottom:0.4rem;
  opacity:0.45;
}
.msg.user .msg-label{color:rgba(140,190,255,0.7)}
.msg.ai .msg-label{color:rgba(100,155,220,0.7)}
.msg-bubble{
  padding:0.85rem 1.1rem;
  border-radius:18px;
  font-size:0.9rem;
  line-height:1.9;
  white-space:pre-wrap;
  word-break:break-word;
  user-select:text;
}
.msg.user .msg-bubble{
  background: rgba(14, 38, 88, 0.45);
  border: 1px solid rgba(70, 120, 200, 0.16);
  border-radius:18px 18px 4px 18px;
  color: rgba(195, 225, 255, 0.85);
}
.msg.ai .msg-bubble{
  background:transparent;
  border:none;
  padding:0;
  color:rgba(185,220,255,0.88);
}
/* Streaming cursor */
.cursor-blink{
  display:inline-block;
  width:1.5px;
  height:1em;
  background:rgba(120,180,255,0.6);
  vertical-align:text-bottom;
  margin-left:2px;
  animation:blink 1.1s ease-in-out infinite;
}
@keyframes blink{
  0%,100%{opacity:1}
  50%{opacity:0}
}
/* Error message */
.msg-error{
  align-self:flex-start;
  font-size:0.8rem;
  color:rgba(200,120,120,0.55);
  padding:0.5rem 0;
  letter-spacing:0.05em;
}
/* ─── COMPOSER ─────────────────────────────────────────────── */
.composer{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  z-index:50;
  padding:0.75rem 0.75rem calc(0.75rem + env(safe-area-inset-bottom));
  background:linear-gradient(to top,rgba(2,8,16,0.9) 60%,transparent 100%);
}
.composer-inner{
  background:rgba(5,15,35,0.7);
  backdrop-filter:blur(30px) saturate(180%);
  border:1px solid rgba(80,130,200,0.22);
  border-radius:18px;
  box-shadow:0 8px 40px rgba(0,0,0,0.5),inset 0 1px 0 rgba(150,200,255,0.06);
  display:grid;
  grid-template-columns:1fr auto;
  gap:0.65rem;
  padding:0.75rem 0.75rem 0.75rem 1.1rem;
  align-items:end;
  max-width:900px;
  margin:0 auto;
}
#userInput{
  background:transparent;
  border:none;
  outline:none;
  color:rgba(200,230,255,0.9);
  font-family:'Noto Serif SC',serif;
  font-size:0.9rem;
  line-height:1.7;
  resize:none;
  min-height:26px;
  max-height:28vh;
  overflow-y:auto;
  padding:0;
  caret-color:rgba(120,180,255,0.8);
}
#userInput::placeholder{
  color:rgba(100,150,220,0.35);
  font-style:italic;
}
.send-btn{
  width:40px;
  height:40px;
  border-radius:12px;
  background:rgba(7,22,48,0.72);
  border:1px solid rgba(60,105,170,0.28);
  color:rgba(138,182,235,0.8);
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-shrink:0;
  transition:all 0.25s ease;
}
.send-btn:hover{
  background:rgba(10,28,58,0.8);
  border-color:rgba(76,122,190,0.38);
  box-shadow:0 0 18px rgba(35,78,138,0.2);
}
.send-btn:disabled{
  opacity:0.35;
  cursor:not-allowed;
}
.send-btn svg{
  width:16px;
  height:16px;
}
.send-btn-wrap {
  position: relative;
  flex-shrink: 0;
}
/* ─── DECISION NUDGE ───────────────────────────────────────── */
.decision-nudge{
  position:fixed;
  bottom:calc(6.8rem + env(safe-area-inset-bottom));
  left:50%;
  transform:translateX(-50%) translateY(8px);
  z-index:48;
  opacity:0;
  transition:opacity 0.4s ease,transform 0.4s ease;
  pointer-events:none;
  white-space:nowrap;
}
.decision-nudge.show{
  opacity:1;
  transform:translateX(-50%) translateY(0);
  pointer-events:auto;
}
.decision-nudge-btn{
  background:rgba(8,25,60,0.7);
  backdrop-filter:blur(20px);
  border:1px solid rgba(80,140,230,0.25);
  color:rgba(160,210,255,0.8);
  font-family:'Noto Serif SC',serif;
  font-size:0.78rem;
  letter-spacing:0.12em;
  padding:0.55rem 1.4rem;
  border-radius:100px;
  cursor:pointer;
  transition:all 0.3s ease;
  box-shadow:0 4px 20px rgba(0,0,10,0.4);
}
.decision-nudge-btn:hover{
  border-color:rgba(100,165,255,0.45);
  color:rgba(190,225,255,0.95);
  box-shadow:0 4px 30px rgba(40,100,255,0.18);
}
/* ─── DECISION DRAWER ──────────────────────────────────────── */
.decision-drawer{
  position:fixed;
  inset:0;
  z-index:200;
  display:flex;
  align-items:flex-end;
  pointer-events:none;
}
.decision-drawer.open{pointer-events:auto}
.drawer-backdrop{
  position:absolute;
  inset:0;
  background:rgba(1,4,12,0.7);
  backdrop-filter:blur(6px);
  opacity:0;
  transition:opacity 0.4s ease;
}
.decision-drawer.open .drawer-backdrop{opacity:1}
.drawer-panel{
  position:relative;
  z-index:1;
  width:100%;
  max-width:700px;
  margin:0 auto;
  background:rgba(4,14,34,0.92);
  backdrop-filter:blur(40px) saturate(180%);
  border:1px solid rgba(80,130,200,0.2);
  border-radius:24px 24px 0 0;
  padding:1.8rem 1.6rem calc(1.8rem + env(safe-area-inset-bottom));
  transform:translateY(100%);
  transition:transform 0.45s cubic-bezier(0.4,0,0.2,1);
  max-height:70vh;
  overflow-y:auto;
}
.decision-drawer.open .drawer-panel{transform:translateY(0)}
.drawer-handle{
  width:36px;
  height:3px;
  background:rgba(100,150,220,0.25);
  border-radius:2px;
  margin:0 auto 1.8rem;
}
.drawer-title{
  font-size:0.88rem;
  letter-spacing:0.2em;
  color:rgba(160,205,255,0.75);
  margin-bottom:1.4rem;
  text-align:center;
}
.drawer-label{
  font-size:0.72rem;
  letter-spacing:0.18em;
  color:rgba(100,155,220,0.5);
  margin-bottom:0.5rem;
  display:block;
}
.drawer-input{
  width:100%;
  background:rgba(5,18,45,0.6);
  border:1px solid rgba(80,130,200,0.18);
  border-radius:12px;
  color:rgba(190,225,255,0.85);
  font-family:'Noto Serif SC',serif;
  font-size:0.85rem;
  line-height:1.7;
  padding:0.75rem 0.9rem;
  outline:none;
  resize:none;
  min-height:56px;
  margin-bottom:1rem;
  transition:border-color 0.3s ease;
}
.drawer-input:focus{border-color:rgba(100,165,255,0.35)}
.drawer-input::placeholder{color:rgba(80,130,200,0.35);font-style:italic}
.drawer-submit{
  width:100%;
  background:rgba(15,45,105,0.6);
  border:1px solid rgba(80,140,230,0.28);
  color:rgba(170,215,255,0.85);
  font-family:'Noto Serif SC',serif;
  font-size:0.82rem;
  letter-spacing:0.18em;
  padding:0.85rem;
  border-radius:12px;
  cursor:pointer;
  transition:all 0.3s ease;
  margin-bottom:1.2rem;
}
.drawer-submit:hover{
  background:rgba(20,55,125,0.75);
  border-color:rgba(100,165,255,0.45);
}
.drawer-submit:disabled{opacity:0.4;cursor:not-allowed}
.drawer-result{
  font-size:0.87rem;
  line-height:1.95;
  color:rgba(180,220,255,0.82);
  min-height:1rem;
  white-space:pre-wrap;
}
.drawer-desc {
  font-size: 0.8rem;
  line-height: 1.9;
  color: rgba(145, 195, 250, 0.66);
  margin-bottom: 0.9rem;
}
.ending-actions {
  display: flex;
  gap: 0.6rem;
  margin-top: 0.8rem;
  flex-wrap: wrap;
}
.ending-btn {
  background: rgba(5, 18, 45, 0.6);
  border: 1px solid rgba(80, 130, 200, 0.22);
  border-radius: 100px;
  color: rgba(160, 210, 255, 0.8);
  font-family: 'Noto Serif SC', serif;
  font-size: 0.75rem;
  letter-spacing: 0.1em;
  padding: 0.4rem 1rem;
  cursor: pointer;
  transition: all 0.25s ease;
}
.ending-btn:hover {
  border-color: rgba(100, 165, 255, 0.4);
  color: rgba(190, 225, 255, 0.95);
}
.ending-btn-skip {
  opacity: 0.5;
}
.ending-btn-skip:hover {
  opacity: 0.8;
}
/* 彩蛋气泡 */
.ending-egg-bubble {
  color: rgba(160, 210, 255, 0.75) !important;
  font-style: italic;
  letter-spacing: 0.04em;
  line-height: 2;
}

/* 今日回顾标签 */
.ending-review-label {
  font-size: 0.6rem !important;
  letter-spacing: 0.4em !important;
  color: rgba(100, 150, 220, 0.4) !important;
  text-transform: uppercase;
  margin-bottom: 0.6rem;
}

/* 今日回顾气泡：和普通 AI 消息明显不同 */
.ending-review-bubble {
  color: rgba(185, 225, 255, 0.82) !important;
  font-style: italic;
  line-height: 2.1 !important;
  border-left: 1px solid rgba(80, 130, 200, 0.25) !important;

/* ════════════════════════════════════════════════════════════

const CONFIG = {
  anthropicBaseUrl: 'https://your-api-endpoint/v1',
  claudeApiKey: '',
  model: 'DeepSeek-V3.2',
};

function buildApiUrl(path) {
  const base = (CONFIG.anthropicBaseUrl || '').replace(/\/+$/, '');
  const p = path.startsWith('/') ? path : `/${path}`;
  return `${base}${p}`;
}
/* ════════════════════════════════════════════════════════════
   WATER CANVAS — fluid blob animation
════════════════════════════════════════════════════════════ */
(function initWater() {
  const canvas = document.getElementById('waterCanvas');
  const ctx    = canvas.getContext('2d');
  let W, H, t = 0;
  // Blobs: each has position, velocity, size, colour stop values
  const blobs = [
    { x:0.25, y:0.35, vx:0.00018, vy:0.00012, r:0.55, hue:210, sat:70, light:18 },
    { x:0.72, y:0.62, vx:-0.00015, vy:0.00020, r:0.48, hue:220, sat:65, light:12 },
    { x:0.50, y:0.80, vx:0.00022, vy:-0.00014, r:0.42, hue:200, sat:60, light:22 },
    { x:0.80, y:0.20, vx:-0.00020, vy:0.00016, r:0.38, hue:230, sat:55, light:15 },
  ];
  function resize() {
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }
  window.addEventListener('resize', resize);
  resize();
  function draw() {
    ctx.clearRect(0, 0, W, H);
    // Dark base
    ctx.fillStyle = '#020810';
    ctx.fillRect(0, 0, W, H);
    // Draw each blob with slow sinusoidal drift
    blobs.forEach((b, i) => {
      const phase = t * 0.0004 + i * 1.3;
      const bx = (b.x + Math.sin(phase * 1.1) * 0.12) * W;
      const by = (b.y + Math.cos(phase * 0.9) * 0.10) * H;
      const br = b.r * Math.min(W, H) * (0.85 + Math.sin(phase * 0.7) * 0.08);
      const grad = ctx.createRadialGradient(bx, by, 0, bx, by, br);
      const alpha1 = 0.18 + Math.sin(phase * 0.5) * 0.06;
      const alpha2 = 0.06 + Math.sin(phase * 0.3) * 0.02;
      grad.addColorStop(0,   `hsla(${b.hue}, ${b.sat}%, ${b.light + 8}%, ${alpha1})`);
      grad.addColorStop(0.45,`hsla(${b.hue}, ${b.sat}%, ${b.light}%, ${alpha2})`);
      grad.addColorStop(1,   `hsla(${b.hue}, ${b.sat}%, ${b.light}%, 0)`);
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.arc(bx, by, br, 0, Math.PI * 2);
      ctx.fill();
    });
    // Subtle horizontal light streak
    const streakY = H * (0.4 + Math.sin(t * 0.0003) * 0.08);
    const streakGrad = ctx.createLinearGradient(0, streakY - 1, 0, streakY + 1);
    streakGrad.addColorStop(0,   'rgba(80,140,255,0)');
    streakGrad.addColorStop(0.5, `rgba(80,140,255,${0.03 + Math.sin(t * 0.0005) * 0.01})`);
    streakGrad.addColorStop(1,   'rgba(80,140,255,0)');
    ctx.fillStyle = streakGrad;
    ctx.fillRect(0, streakY - 60, W, 120);
    t++;
    requestAnimationFrame(draw);
  }
  draw();
})();
/* ════════════════════════════════════════════════════════════

════════════════════════════════════════════════════════════ */

          fill="rgba(140,195,255,${opacity})"
          style="animation:starPulse 3.5s ease-in-out infinite"/>
  </svg>`;
}

  if (!db) {
    db = window.supabase.createClient(CONFIG.supabaseUrl, CONFIG.supabaseKey);

    emotional_signal: raw?.emotional_signal ?? null,
    day_title: raw?.day_title ?? null,
    profile_snapshot: raw?.profile_snapshot ?? null,
  };

function escapeHtml(text) {
  return String(text || '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

function getDateKey(isoString) {
  const d = isoString ? new Date(isoString) : new Date();
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${day}`;
}

function getDateLabel(dateKey) {
  return dateKey;
}

function getFirstMetDay() {
  let firstDay = localStorage.getItem('undertow_first_day');
  if (!firstDay) {
    firstDay = new Date().toISOString();
    localStorage.setItem('undertow_first_day', firstDay);
  }
  return new Date(firstDay);
}

function getDayNumber() {
  const first = getFirstMetDay();
  const today = new Date();
  const diff = Math.floor(
    (today.setHours(0, 0, 0, 0) -
      new Date(first).setHours(0, 0, 0, 0))
    / (1000 * 60 * 60 * 24)
  );
  return diff + 1;
}

function getDayNumberFromEntries() {
  try {
    const entries = JSON.parse(localStorage.getItem('undertow_entries') || '[]');
    if (!Array.isArray(entries) || entries.length === 0) {
      return getDayNumber();
    }

    const sorted = entries
      .map((e) => new Date(e?.created_at || 0).getTime())
      .filter((v) => Number.isFinite(v) && v > 0)
      .sort((a, b) => a - b);
    if (!sorted.length) return getDayNumber();

    const first = new Date(sorted[0]);
    const today = new Date();
    const diff = Math.floor(
      (today.setHours(0, 0, 0, 0) - new Date(first).setHours(0, 0, 0, 0))
      / (1000 * 60 * 60 * 24)
    );
    return Math.max(1, diff + 1);
  } catch {
    return getDayNumber();
  }
}

const DAY_SESSION_IDLE_MS = 60 * 60 * 1000;

function getCurrentConversationDayKey() {
  const now = Date.now();
  const wallClockKey = getDateKey(new Date(now).toISOString());
  let activeKey = localStorage.getItem('undertow_active_day_key');
  const lastUserSendRaw = localStorage.getItem('undertow_last_user_send_at')
    || localStorage.getItem('undertow_last_activity_at');
  const lastUserSend = lastUserSendRaw ? Number(lastUserSendRaw) : 0;

  if (!activeKey) {
    activeKey = wallClockKey;
  }

  if (activeKey !== wallClockKey) {
    const idleMs = lastUserSend > 0 ? (now - lastUserSend) : DAY_SESSION_IDLE_MS;
    if (idleMs >= DAY_SESSION_IDLE_MS) {
      activeKey = wallClockKey;
    }
  }

  localStorage.setItem('undertow_active_day_key', activeKey);
  return activeKey;
}

function markConversationActivity() {
  const now = String(Date.now());
  localStorage.setItem('undertow_last_user_send_at', now);
  localStorage.setItem('undertow_last_activity_at', now);
}

function formatTimeLabel(isoString) {
  if (!isoString) return '--:--';
  const d = new Date(isoString);
  if (Number.isNaN(d.getTime())) return '--:--';
  const hh = String(d.getHours()).padStart(2, '0');
  const mm = String(d.getMinutes()).padStart(2, '0');
  return `${hh}:${mm}`;
}

function formatDateShort(isoString) {
  if (!isoString) return '--';
  const d = new Date(isoString);
  if (Number.isNaN(d.getTime())) return '--';
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return `${m}/${day}`;
}

function buildHistoryModel(entries) {
  const sorted = [...entries].sort((a, b) => {
    const at = new Date(a.created_at || 0).getTime();
    const bt = new Date(b.created_at || 0).getTime();
    return at - bt;
  });

  const map = new Map();
  for (const e of sorted) {
    const dateKey = e.conversation_day_key || getDateKey(e.created_at);
    if (!map.has(dateKey)) {
      map.set(dateKey, []);
    }
    map.get(dateKey).push(e);
  }

  const dateKeysAsc = [...map.keys()].sort((a, b) => a.localeCompare(b));
  const dayByDate = new Map(dateKeysAsc.map((key, idx) => [key, idx + 1]));
  const groups = [...dateKeysAsc].reverse().map((key) => ({
    dateKey: key,
    dayNumber: dayByDate.get(key),
    entries: map.get(key) || [],
  }));

  return { groups, dayByDate, dateKeysAsc };
}

async function loadAllEntries() {
  try {
    const entries = JSON.parse(localStorage.getItem('undertow_entries') || '[]');
    if (!Array.isArray(entries)) return [];
    return entries.map((entry, idx) => normalizeEntry(entry, idx));
  } catch {
    return [];
  }
}

function poeticDayTitle(group) {
  // 优先用 AI 生成的 day_title
  const titled = [...group.entries]
    .reverse()
    .find(e => e.day_title && e.day_title.trim());
  if (titled) return titled.day_title.trim();

  // 降级：用 emotional_signal
  const signal = group.entries
    .map(e => (e.emotional_signal || '').trim())
    .find(Boolean);
  if (signal) return signal.slice(0, 16);

  // 最终降级：只显示天数，不拼奇怪的句子
  return State.lang === 'zh'
    ? `第 ${group.dayNumber} 天`
    : `Day ${group.dayNumber}`;
}

function renderDayMessages(group) {
  // 清空聊天区域
  chatArea.innerHTML = '';

  if (!group || !group.entries || group.entries.length === 0) {
    const emptyEl = document.createElement('div');
    emptyEl.className = 'chat-welcome';
    emptyEl.id = 'chatWelcome';
    emptyEl.innerHTML = `<div class="chat-welcome-text">${escapeHtml(t().historyEmpty)}</div>`;
    chatArea.appendChild(emptyEl);
    exitSealedMode();
    return;
  }

  // 渲染这一天的所有消息
  for (const entry of group.entries) {
    // 跳过结束标记，不显示为消息气泡
    if (entry.content === '[今天到这里]') continue;
    // 跳过记忆溶解占位符的用户气泡（只保留它的 ai_response 如果有）
    const isDissolveMarker = String(entry.content || '').trim() ===
      '（深水区的记忆已溶解。仅保留当天的感知与侧写。）';

    if (!isDissolveMarker) {
      const userEl = document.createElement('div');
      userEl.className = 'msg user';
      userEl.style.opacity = '1';
      userEl.style.animation = 'none';
      userEl.innerHTML = `
        <div class="msg-label">
          ${State.lang === 'zh' ? '你' : 'You'}
        </div>
        <div class="msg-bubble">
          ${escapeHtml(entry.content || '')}
        </div>`;
      chatArea.appendChild(userEl);
    }

    if (entry.ai_response) {
      const aiEl = document.createElement('div');
      aiEl.className = 'msg ai';
      aiEl.style.opacity = '1';
      aiEl.style.animation = 'none';
      aiEl.innerHTML = `
        <div class="msg-label">
          ${State.lang === 'zh' ? '暗流' : 'Undertow'}
        </div>
        <div class="msg-bubble">
          ${escapeHtml(entry.ai_response)}
        </div>`;
      chatArea.appendChild(aiEl);
    }
  }

  // 如果有封存回顾文字，显示在最后
  const sealedText = [...group.entries]
    .reverse()
    .map(e => e?.profile_snapshot?.sealed_review_text)
    .find(v => typeof v === 'string' && v.trim().length > 0);

  if (sealedText) {
    const reviewEl = document.createElement('div');
    reviewEl.className = 'msg ai ending-review';
    reviewEl.style.opacity = '1';
    reviewEl.style.animation = 'none';
    reviewEl.innerHTML = `
      <div class="msg-label ending-review-label">从那天打捞</div>
      <div class="msg-bubble ending-review-bubble">
        ${escapeHtml(sealedText)}
      </div>`;
    chatArea.appendChild(reviewEl);
  }

  // 最后判断封存状态
  // 这一步必须在所有消息渲染完之后才执行
  const todayKey = getCurrentConversationDayKey();
  if (group.dateKey === todayKey) {
    exitSealedMode();
  } else {
    enterSealedMode(group);
  }

  // 滚动到顶部，让用户从头看
  chatArea.scrollTop = 0;
}

function enterSealedMode(group) {
  // 输入框封存
  userInput.disabled = true;
  userInput.placeholder = '';
  userInput.style.opacity = '0.18';
  userInput.style.cursor = 'not-allowed';
  sendBtn.disabled = true;
  sendBtn.style.opacity = '0.18';

  // 封存提示
  const sealedHint = $('sealedHint') ||
    (() => {
      const el = document.createElement('div');
      el.id = 'sealedHint';
      el.className = 'sealed-hint';
      // 插入到 composer 里，输入框上方

      }）已沉入暗流`
    : `${t().dayLabel(group.dayNumber)} has settled`;

  const hasSealed = [...group.entries]
    .reverse()
    .some((e) => (e?.profile_snapshot?.sealed_review_text || '').trim());

    <span class="sealed-date">${dateLabel}</span>

  $('sealedSurfaceBtn')?.addEventListener('click', async () => {
    $('sealedSurfaceBtn').disabled = true;
    $('sealedSurfaceBtn').style.opacity = '0.4';
    await generateSealedReview(group);
    $('sealedSurfaceBtn').disabled = false;
    $('sealedSurfaceBtn').style.opacity = '';
  });
}

function exitSealedMode() {
  userInput.disabled = false;
  userInput.style.opacity = '1';
  userInput.style.cursor = '';
  userInput.placeholder = t().placeholder;
  sendBtn.disabled = false;
  sendBtn.style.opacity = '1';
  sendBtn.style.cursor = '';

  const deepBtn = $('deepModeBtn');
  if (deepBtn) {
    deepBtn.disabled = false;
    deepBtn.style.opacity = '1';
  }

  const sealedHint = $('sealedHint');
  if (sealedHint) sealedHint.style.display = 'none';

function renderHistoryList(groups) {
  historyList.innerHTML = '';
  if (!groups || groups.length === 0) {
    historyList.innerHTML = `<div class="sidebar-empty">${t().historyEmpty}</div>`;
    return;
  }

  const todayKey = getCurrentConversationDayKey();

  groups.forEach((group) => {
    const card = document.createElement('article');
    card.className = 'history-card';
    card.classList.add(group.dateKey === todayKey ? 'is-today' : 'is-past');
    const title = poeticDayTitle(group);
    const lastText = (group.entries[group.entries.length - 1]?.content || '').replace(/\s+/g, ' ').trim();
    const snippet = (lastText || '').slice(0, 40) + ((lastText || '').length > 40 ? '…' : '');
    const signal = group.entries
      .map((entry) => (entry.emotional_signal || '').trim())
      .find(Boolean);
    card.innerHTML = `
      <div class="hc-day">${t().dayLabel(group.dayNumber)} · ${getDateLabel(group.dateKey)}</div>
      <div class="hc-snippet">${escapeHtml(title)}</div>
      <div class="hc-snippet">${snippet}</div>
      ${signal ? `<div class="hc-signal">${escapeHtml(signal)}</div>` : ''}
    `;
    card.addEventListener('click', (e) => {
      e.stopPropagation();

      State.activeHistoryDay = group.dateKey;
      State.manualHistoryView = true;
      for (const n of historyList.querySelectorAll('.history-card')) {
        n.classList.remove('active');
      }
      card.classList.add('active');

      const targetGroup = State.historyGroups
        .find(g => g.dateKey === group.dateKey) || group;

      if (window.innerWidth <= 768) {
        // 先渲染内容，再关闭侧边栏
        renderDayMessages(targetGroup);
        requestAnimationFrame(() => {
          document.body.classList.remove('sidebar-open');
        });
      } else {
        renderDayMessages(targetGroup);
      }
    });
    if (State.activeHistoryDay === group.dateKey) {
      card.classList.add('active');
    }
    historyList.appendChild(card);
  });

  // 回顾功能需要有足够历史积累
  const allNotables = (groups || [])
    .flatMap(g => g.entries || [])
    .map(e => e?.profile_snapshot?.notable)
    .filter(n => n && n.trim() && n.length > 4);

  if (toolMirror) {
    toolMirror.disabled = groups.length < 7 || allNotables.length < 3;
  }
  // toolSimulate 和 toolProfile 始终可点击
  if (toolSimulate) toolSimulate.disabled = false;
  if (toolProfile) toolProfile.disabled = false;

  // 侧边栏容器 flex 撑开，让工具区沉到底部
  const sidebarEl = $('sidebar');
  if (sidebarEl) {
    sidebarEl.style.display = 'flex';
    sidebarEl.style.flexDirection = 'column';
  }
}

async function renderHistory() {
  // This function only updates sidebar/history state; it must not render chatArea.
  const entries = await loadAllEntries();
  if (entries.length === 0) {
    renderHistoryList([]);
    State.historyGroups = [];
    State.activeHistoryDay = null;
    State.dayNumber = 1;
    dayBadge.textContent = t().dayLabel(1);
    return;
  }

  const { groups, dateKeysAsc } = buildHistoryModel(entries);
  State.historyGroups = groups;

  const todayKey = getCurrentConversationDayKey();
  State.dayNumber = getDayNumberFromEntries();
  dayBadge.textContent = t().dayLabel(State.dayNumber);

  const maxDay = dateKeysAsc.length;
  if (maxDay >= 22) {
    State.phase = 'simulating';
  } else if (maxDay >= 10) {
    State.phase = 'seeing';
  } else {
    State.phase = 'listening';
  }
  localStorage.setItem('undertow_phase', State.phase);

  if (!State.activeHistoryDay || !groups.some((g) => g.dateKey === State.activeHistoryDay)) {
    State.activeHistoryDay = groups[0]?.dateKey || null;
  }

  renderHistoryList(groups);

  // If user is manually reviewing a past day, keep chat pinned there after list refresh.
  if (State.manualHistoryView && State.activeHistoryDay) {
    const selected = groups.find((g) => g.dateKey === State.activeHistoryDay);
    if (selected) {
      renderDayMessages(selected);
    }
  }

  // Do not force-reset selection to today here; keep user's chosen day clickable.
}

async function updateHistoryListOnly() {
  // Only update the sidebar list; do not touch chatArea.
  const entries = await loadAllEntries();
  if (entries.length === 0) return;

  const { groups, dateKeysAsc } = buildHistoryModel(entries);
  State.historyGroups = groups;

  const todayKey = getCurrentConversationDayKey();
  State.dayNumber = getDayNumberFromEntries();
  dayBadge.textContent = t().dayLabel(State.dayNumber);

  const maxDay = dateKeysAsc.length;
  if (maxDay >= 22) State.phase = 'simulating';
  else if (maxDay >= 10) State.phase = 'seeing';
  else State.phase = 'listening';
  localStorage.setItem('undertow_phase', State.phase);

  if (!State.activeHistoryDay || !groups.some((g) => g.dateKey === State.activeHistoryDay)) {
    State.activeHistoryDay = groups[0]?.dateKey || null;
  }

  renderHistoryList(groups);

  // Keep the currently selected history day visible instead of snapping back to today.
  if (State.manualHistoryView && State.activeHistoryDay) {
    const selected = groups.find((g) => g.dateKey === State.activeHistoryDay);
    if (selected) {
      renderDayMessages(selected);
    }
  }

  if (typeof syncHistoryDrawer === 'function') {
    syncHistoryDrawer();
  }
}

  const todayKey = getCurrentConversationDayKey();

      const flat = model.dateKeysAsc.flatMap((key) => {

function detectRecentEmotionPattern() {
  // Scan the latest 8 day-groups (newest first) for persistent tone patterns.
  const recentGroups = State.historyGroups.slice(0, 8);
  if (recentGroups.length < 4) return null;

  const tones = recentGroups
    .map((g) => {
      const snapshot = [...(g.entries || [])]
        .reverse()
        .map((e) => e?.profile_snapshot?.emotional_tone)
        .find((t) => t && t.trim());
      return snapshot || '';
    })
    .filter(Boolean);

  if (tones.length < 3) return null;

  const lowEnergyWords = ['焦虑', '疲惫', '压抑', '低落', '烦躁', '迷茫', '沉重'];
  const highEnergyWords = ['兴奋', '充实', '平静', '轻松', '满足', '期待'];

  const lowCount = tones.filter((t) =>
    lowEnergyWords.some((w) => t.includes(w))
  ).length;

  const highCount = tones.filter((t) =>
    highEnergyWords.some((w) => t.includes(w))
  ).length;

  const ratio = tones.length;

  if (lowCount >= Math.ceil(ratio * 0.6)) {
    return { type: 'persistent_low', count: lowCount, total: ratio };
  }
  if (highCount >= Math.ceil(ratio * 0.7)) {
    return { type: 'persistent_stable', count: highCount, total: ratio };
  }
  return null;
}

async function buildTodayMessages(newUserText) {
  // Get today's existing turns from in-memory history groups.
  const todayKey = getCurrentConversationDayKey();
  const todayGroup = State.historyGroups.find((g) => g.dateKey === todayKey);

  const messages = [];

  if (todayGroup && todayGroup.entries.length > 0) {
    for (const entry of todayGroup.entries) {
      if (entry.content === '[今天到这里]') continue;

      messages.push({
        role: 'user',
        content: entry.content || '',
      });

      if (entry.ai_response) {
        messages.push({
          role: 'assistant',
          content: entry.ai_response,
        });
      }
    }
  }

  messages.push({
    role: 'user',
    content: newUserText,
  });

  if (messages.length === 0 || messages[messages.length - 1].role !== 'user') {
    return [{ role: 'user', content: newUserText }];
  }

  return messages;
}
/* ════════════════════════════════════════════════════════════
  LLM API (OpenAI-compatible) — STREAMING
════════════════════════════════════════════════════════════ */
async function streamClaude(systemPrompt, messages, onChunk, onDone) {
  const runtimeKey = (CONFIG.claudeApiKey || '').trim();
  if (!runtimeKey) {
    // Demo mode — simulate response
    const demo = State.lang === 'zh'
      ? '（未检测到 AgentRouter Key，请重新点击开始并输入 Key。）'
      : '(No AgentRouter key found. Click Begin again and enter your key.)';
    for (const ch of demo) {
      await new Promise(r => setTimeout(r, 30));
      onChunk(ch);
    }
    onDone(demo);
    return;
  }
  const res = await fetch(buildApiUrl('/chat/completions'), {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'Authorization': `Bearer ${runtimeKey}`,
    },
    body: JSON.stringify({
      model: CONFIG.model,
      max_tokens: 320,
      stream: true,
      messages: [
        { role: 'system', content: systemPrompt },
        ...messages,
      ],
    }),
  });
  if (!res.ok) throw new Error(await parseApiError(res));
  const reader  = res.body.getReader();
  const decoder = new TextDecoder();
  let   buf = '', full = '';
  while (true) {
    const { done, value } = await reader.read();
    if (done) break;
    buf += decoder.decode(value, { stream: true });
    const lines = buf.split('\n');
    buf = lines.pop() || '';
    for (const line of lines) {
      const raw = line.trim();
      if (!raw.startsWith('data:')) continue;
      const payload = raw.slice(5).trim();
      if (!payload || payload === '[DONE]') continue;
      try {
        const p = JSON.parse(payload);
        const delta = p?.choices?.[0]?.delta?.content;
        if (delta) {
          full += delta;
          onChunk(delta);
        }
      } catch {}
    }
  }
  onDone(full);
}
/* ════════════════════════════════════════════════════════════
   LLM API (OpenAI-compatible) — NON-STREAMING (for profile extraction, day-21)
════════════════════════════════════════════════════════════ */
async function callClaude(systemPrompt, userMsg, maxTokens = 240) {
  const runtimeKey = (CONFIG.claudeApiKey || '').trim();
  if (!runtimeKey) {
    return '（演示模式）';
  }
  const res = await fetch(buildApiUrl('/chat/completions'), {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'Authorization': `Bearer ${runtimeKey}`,
    },
    body: JSON.stringify({
      model: CONFIG.model,
      max_tokens: maxTokens,
      stream: false,
      messages: [
        { role: 'system', content: systemPrompt },
        { role: 'user', content: userMsg },
      ],
    }),
  });
  if (!res.ok) throw new Error(await parseApiError(res));
  const json = await res.json();
  const msg = json?.choices?.[0]?.message?.content;
  if (typeof msg === 'string') return msg.trim();
  if (Array.isArray(msg)) {
    return msg.map((p) => (typeof p === 'string' ? p : (p?.text || ''))).join('').trim();
  }
  return '';
}

/* ════════════════════════════════════════════════════════════
   RENDER — AI BUBBLE (streaming)
════════════════════════════════════════════════════════════ */
function createAIBubble() {
  hideWelcome();
  const div = document.createElement('div');
  div.className = 'msg ai';
  const label = State.lang === 'zh' ? '暗流' : 'Undertow';
  div.innerHTML = `
    <div class="msg-label">${label}</div>
    <div class="msg-bubble"><span class="cursor-blink"></span></div>`;
  chatArea.appendChild(div);
  chatArea.scrollTop = chatArea.scrollHeight;
  return div.querySelector('.msg-bubble');
}
function appendToAIBubble(bubble, chunk) {
  // Remove cursor, append chars with fade, re-add cursor
  const cursor = bubble.querySelector('.cursor-blink');
  if (cursor) cursor.remove();
  for (const ch of chunk) {
    const s = document.createElement('span');
    s.textContent = ch;
    s.style.cssText = 'opacity:0;transition:opacity 0.25s ease;display:inline';
    bubble.appendChild(s);
    setTimeout(() => { s.style.opacity = '1'; }, 10);
  }
  const cur = document.createElement('span');
  cur.className = 'cursor-blink';
  bubble.appendChild(cur);
  requestAnimationFrame(() => {
    chatArea.scrollTop = chatArea.scrollHeight;
  });
}
function finishAIBubble(bubble) {
  const cursor = bubble.querySelector('.cursor-blink');
  if (cursor) cursor.remove();
  chatArea.scrollTop = chatArea.scrollHeight;
}
function addErrorMsg(msg) {
  const div = document.createElement('div');

async function parseApiError(res) {
  let detail = '';
  try {
    const text = await res.text();
    if (text) {
      try {
        const json = JSON.parse(text);
        detail = json?.error?.message || json?.message || text;
      } catch {
        detail = text;
      }
    }
  } catch {}
  const suffix = detail ? `: ${String(detail).slice(0, 180)}` : '';
  return `API ${res.status}${suffix}`;
}

async function saveEntry(content, aiResponse) {
  const conversationDayKey = getCurrentConversationDayKey();
  const entry = {
    id: crypto.randomUUID(),
    user_id: State.userId,
    content,
    ai_response: aiResponse,
    day_number: State.dayNumber,
    created_at: new Date().toISOString(),
    conversation_day_key: conversationDayKey,
    emotional_signal: null,
    day_title: null,
    profile_snapshot: null,
  };

  try {
    const entries = JSON.parse(localStorage.getItem('undertow_entries') || '[]');
    if (!Array.isArray(entries)) return null;
    entries.push(entry);
    localStorage.setItem('undertow_entries', JSON.stringify(entries));
    markConversationActivity();
    await checkAndDissolveMemory();
  } catch {}

  return entry.id;
}

   PROFILE EXTRACTION (background, silent)
════════════════════════════════════════════════════════════ */
async function extractProfile(userText, aiText, target = null) {
  try {
    const sys = '你是用户行为模式提取器。只输出合法JSON。不输出任何其他内容，不加任何解释，不加markdown代码块。';
    const prompt = `
用户今天说的话：${userText}
暗流的回应：${aiText}
这是用户使用的第 ${State.dayNumber} 天。

请仔细分析，提取以下内容，以JSON格式返回。
所有字段必须填写，没有明确信息时填 null，不要猜测：

{
  "emotional_tone": "用一个词描述今日情绪基调（如：平静、焦虑、疲惫、兴奋、压抑、矛盾）",
  "energy_level": "高/中/低",
  "topics": ["具体话题1", "具体话题2"],
  "people_mentioned": ["提到的人名或关系，如：妈妈、前男友、同事小张，没有则返回空数组"],
  "avoidance_signal": "用户是否在某个话题上刚要深入就转移了，或者描述得异常简短，请描述具体是什么话题，或null",
  "recurring_theme": "这个话题或情绪在用户的记录里出现过吗？如果是，请说明是什么主题，大概第几次出现，或null",
  "contradiction": "用户今天说的内容，和他们之前说过的事情或立场，是否有不一致？请具体描述矛盾是什么，或null",
  "decision_pending": "用户提到了什么还没有做出的决定或还没有解决的事，或null",
  "mood_shift": "和昨天或上一条记录相比，用户的状态有没有明显变化，变化是什么，或null",
  "notable": "今天最值得长期记住的一句话、一个细节、或一个转折点，尽量用用户的原话，或null"
}
`;
    const raw = await callClaude(sys, prompt, 180);
    let json;
    try { json = JSON.parse(raw); }
    catch {
      const m = raw.match(/\{[\s\S]*\}/);
      if (m) json = JSON.parse(m[0]);
    }
    if (!json) return;

    try {
      const entries = JSON.parse(localStorage.getItem('undertow_entries') || '[]');
      if (!Array.isArray(entries) || entries.length === 0) return;
      const idxById = target?.entryId
        ? entries.findIndex((e) => e.id === target.entryId)
        : -1;
      const idxByCreatedAt = idxById === -1 && target?.createdAt
        ? entries.findIndex((e) => e.created_at === target.createdAt)
        : -1;
      const idx = idxById >= 0 ? idxById : (idxByCreatedAt >= 0 ? idxByCreatedAt : entries.length - 1);
      if (idx >= 0) {
        entries[idx].emotional_signal = json.notable || json.emotional_tone;
        entries[idx].profile_snapshot = json;
        localStorage.setItem('undertow_entries', JSON.stringify(entries));
      }
    } catch {}

    void updateProfileSummary();
  } catch { /* silent */ }
}

async function generateDayTitle(todayGroup, entryId) {
  try {
    if (!todayGroup || todayGroup.entries.length === 0) return;

    const allText = todayGroup.entries
      .filter(e => e.content !== '[今天到这里]')
      .map(e => e.content)
      .join('\n');

    if (!allText.trim()) return;

    const sys = '你是标题提取器。只输出标题本身，不超过12个字，不加引号，不加标点解释，不加任何其他内容。';

    const prompt = `根据用户今天说的这些话，写一个标题。
不是总结事件，是捕捉今天最有重量的那个东西——
可以是一个词，一个动作，一种感觉，一个还没有答案的问题。
不要出现"今天""这天""第N天"这些词。
最多12个字。

用户今天说的话：
${allText}`;

    const title = await callClaude(sys, prompt, 40);
    if (!title || title.trim().length === 0) return;
    const clean = title.trim().slice(0, 20);

    try {
      const entries = JSON.parse(localStorage.getItem('undertow_entries') || '[]');
      if (Array.isArray(entries) && entryId) {
        const idx = entries.findIndex((e) => e.id === entryId);
        if (idx !== -1) {
          entries[idx].day_title = clean;
          localStorage.setItem('undertow_entries', JSON.stringify(entries));
        }
      }
    } catch {}

    // 更新本地缓存并重新渲染侧边栏
    const todayKey = getCurrentConversationDayKey();
    const group = State.historyGroups
      .find(g => g.dateKey === todayKey);
    if (group && group.entries.length > 0) {
      const target = entryId
        ? group.entries.find((e) => e.id === entryId)
        : group.entries[group.entries.length - 1];
      if (target) {
        target.day_title = clean;
      } else {
        group.entries[group.entries.length - 1].day_title = clean;
      }
      renderHistoryList(State.historyGroups);
      if (typeof syncHistoryDrawer === 'function') {
        syncHistoryDrawer();
      }
    }
  } catch { /* silent */ }
}

async function generateSealedReview(group) {
  const conversation = group.entries
    .filter(e => e.content !== '[今天到这里]')
    .map(e => `用户：${e.content}\n暗流：${e.ai_response || '—'}`)
    .join('\n\n');

  if (!conversation.trim()) return;

  const existingText = [...group.entries]
    .reverse()
    .map((e) => e?.profile_snapshot?.sealed_review_text)
    .find((v) => typeof v === 'string' && v.trim().length > 0);

  // 在 chatArea 末尾加一个回顾气泡
  const bubble = document.createElement('div');
  bubble.className = 'msg ai ending-review';
  bubble.style.opacity = '1';
  bubble.innerHTML = `
    <div class="msg-label ending-review-label">
      从那天打捞
    </div>
    <div class="msg-bubble ending-review-bubble" id="streamBubble">
      <span class="cursor-blink"></span>
    </div>
  `;
  chatArea.appendChild(bubble);
  chatArea.scrollTop = chatArea.scrollHeight;

  const streamTarget = bubble.querySelector('#streamBubble');
  if (!streamTarget) return;

  if (existingText) {
    finishAIBubble(streamTarget);
    streamTarget.textContent = existingText;
    chatArea.scrollTop = chatArea.scrollHeight;
    return;
  }

  const sys = `
你是「暗流」。用户在回看过去某一天的对话。
你要为那一天写一个回望——

不是复述发生了什么。
是找到那一天里，有一件事在之后可能还在发酵，
或者一个当时没说完的东西。
可以轻轻问一句：那件事，现在还在吗？
或者只是说出你看见的，然后停在那里。

字数：60到90字。
语气比当天的对话更慢，更有距离感，
像隔着时间看那天的自己。
禁止：「那天很有意义」「你很勇敢」
      「时间会给你答案」之类的话。
`;

  let full = '';
  try {
    await streamClaude(
      sys,
      [{ role: 'user',
         content: `这是${t().dayLabel(group.dayNumber)}的对话：\n${conversation}`
      }],
      (chunk) => {
        full += chunk;
        appendToAIBubble(streamTarget, chunk);
      },
      () => finishAIBubble(streamTarget)
    );

    const sealedText = full.trim();
    if (!sealedText) return;

    const target = [...group.entries]
      .reverse()
      .find((e) => e.content !== '[今天到这里]');
    if (!target) return;

    const mergedSnapshot = {
      ...(target.profile_snapshot || {}),
      sealed_review_text: sealedText,
      sealed_review_at: new Date().toISOString(),
    };

    const db = getDB();
    if (db && target.id) {
      await db.from('entries')
        .update({ profile_snapshot: mergedSnapshot })
        .eq('id', target.id)
        .eq('user_id', State.userId);
    } else {
      try {
        const entries = JSON.parse(localStorage.getItem('undertow_entries') || '[]');
        const idx = entries.findIndex((e) => e.created_at === target.created_at);
        if (idx >= 0) {
          entries[idx].profile_snapshot = mergedSnapshot;
          localStorage.setItem('undertow_entries', JSON.stringify(entries));
          await checkAndDissolveMemory();
        }
      } catch {}
    }

    target.profile_snapshot = mergedSnapshot;
  } catch {
    finishAIBubble(streamTarget);
  }
}

async function updateProfileSummary() {
  try {
    const entries = await loadAllEntries();

    if (!entries || entries.length < 3) return;
    const recent = entries
      .slice()
      .sort((a, b) => new Date(b.created_at || 0).getTime() - new Date(a.created_at || 0).getTime())
      .slice(0, 30);

    if (recent.length % 5 !== 0) return;

    const entriesSummary = recent
      .slice()
      .reverse()
      .map(e =>
      `第${e.day_number}天 [${e.emotional_signal || ''}]：${e.content}`

const END_OF_DAY_RE = /^\s*(\[今天到这里\]|今天到这里|收工|先到这里)\s*$/i;

function isEndOfDaySignal(text) {
  return END_OF_DAY_RE.test(String(text || '').trim());
}

function getAnalyzableDayEntries(entries) {
  return (entries || []).filter((e) => {
    const content = String(e?.content || '').trim();
    return content && !isEndOfDaySignal(content);
  });
}

function buildDayPackText(dayEntries) {
  return {
    dayUserText: dayEntries.map((e, idx) => `第${idx + 1}条：${e.content || ''}`).join('\n'),
    dayAiText: dayEntries.map((e, idx) => `第${idx + 1}条回应：${e.ai_response || ''}`).join('\n'),
  };
}

const MEMORY_DISSOLVE_TEXT = '（深水区的记忆已溶解。仅保留当天的感知与侧写。）';

function getStorageSizeMB() {
  let totalChars = 0;
  for (let i = 0; i < localStorage.length; i += 1) {
    const key = localStorage.key(i);
    if (!key) continue;
    totalChars += (localStorage.getItem(key) || '').length;
  }
  return (totalChars * 2) / (1024 * 1024);
}

function injectPoeticWarning() {

function buildDissolvedEntry(group) {
  const anchor = [...(group.entries || [])]
    .reverse()
    .find((e) => String(e?.content || '').trim() && !isEndOfDaySignal(e?.content))
    || group.entries?.[group.entries.length - 1]
    || null;

  return {
    id: crypto.randomUUID(),
    user_id: anchor?.user_id || State.userId,
    content: MEMORY_DISSOLVE_TEXT,
    ai_response: '',
    day_number: Number.isFinite(anchor?.day_number) ? anchor.day_number : (group.dayNumber || 1),
    created_at: anchor?.created_at || new Date().toISOString(),
    conversation_day_key: group.dateKey || anchor?.conversation_day_key || getDateKey(new Date().toISOString()),
    emotional_signal: anchor?.emotional_signal || null,
    day_title: anchor?.day_title || null,
    profile_snapshot: anchor?.profile_snapshot || null,
  };
}

async function checkAndDissolveMemory() {
  const TRIGGER_THRESHOLD = 4.8;
  const TARGET_THRESHOLD = 3.0;
  let currentSize = getStorageSizeMB();

  if (currentSize < TRIGGER_THRESHOLD) return;

  let entries;
  try {
    entries = JSON.parse(localStorage.getItem('undertow_entries') || '[]');
  } catch {
    return;
  }
  if (!Array.isArray(entries) || entries.length === 0) return;

  const model = buildHistoryModel(entries);
  const groupsByDate = new Map(model.groups.map((g) => [g.dateKey, {
    dateKey: g.dateKey,
    dayNumber: g.dayNumber,
    entries: [...g.entries],
  }]));
  const orderedGroups = model.dateKeysAsc.map((key) => groupsByDate.get(key)).filter(Boolean);
  const todayKey = getCurrentConversationDayKey();
  let dissolvedCount = 0;

  for (const group of orderedGroups) {
    if (currentSize <= TARGET_THRESHOLD) break;
    if (!group || !group.entries || group.entries.length === 0) continue;
    if (group.dateKey === todayKey) continue;

    const alreadyDissolved = group.entries.length === 1
      && String(group.entries[0]?.content || '').trim() === MEMORY_DISSOLVE_TEXT;
    if (alreadyDissolved) continue;

    group.entries = [buildDissolvedEntry(group)];
    dissolvedCount += 1;

    const flattened = orderedGroups.flatMap((g) => g.entries || []);
    localStorage.setItem('undertow_entries', JSON.stringify(flattened));
    currentSize = getStorageSizeMB();
  }

  if (dissolvedCount > 0) {
    injectPoeticWarning();
    await updateHistoryListOnly();
  }
}

function hasDayEndMarker(entries, dayKey) {
  return (entries || []).some((e) => {
    if (!isEndOfDaySignal(e?.content)) return false;
    const markerDay = e?.conversation_day_key || getDateKey(e?.created_at);
    return markerDay === dayKey;
  });
}

async function generateTomorrowHook(dayEntries, sourceDateKey) {
  try {
    if (!dayEntries || !dayEntries.length || !sourceDateKey) return;

    const existingRaw = localStorage.getItem('undertow_tomorrow_hook');
    if (existingRaw) {
      try {
        const existing = JSON.parse(existingRaw);
        if (existing?.sourceDateKey === sourceDateKey) return;
      } catch {}
    }

    const conversation = dayEntries
      .map((e, idx) => `第${idx + 1}段\n用户：${e.content || ''}\n暗流：${e.ai_response || '—'}`)
      .join('\n\n');

    const sys = '你是昨日钩子提炼器。你只输出一句中文短句，或输出 [NONE]。不要输出解释。';
    const prompt = `
请评估今天用户的对话中，是否存在强烈情绪波动、未解决困惑、或明天可能继续发酵的悬念。

规则：
--如果值得被轻轻提起：输出一句中文，12到22字，克制、隐晦、不说教。
--如果今天只是平淡闲聊：只输出 [NONE]。
--禁止输出多句，禁止解释。

今天对话：
${conversation}
`;

    const raw = await callClaude(sys, prompt, 80);
    const hook = (raw || '').trim().replace(/^"|"$/g, '');
    const finalHook = hook ? hook.slice(0, 28) : '[NONE]';

    localStorage.setItem('undertow_tomorrow_hook', JSON.stringify({
      sourceDateKey,
      hook: finalHook,
      consumed: false,
      createdAt: new Date().toISOString(),
    }));
  } catch {}
}

async function runEndOfDayAnalysis(triggerText) {
  if (!isEndOfDaySignal(triggerText)) return;

  const todayKey = getCurrentConversationDayKey();
  const todayGroup = State.historyGroups.find((g) => g.dateKey === todayKey);
  if (!todayGroup || !todayGroup.entries.length) return;

  const dayEntries = getAnalyzableDayEntries(todayGroup.entries);
  if (!dayEntries.length) return;

  const targetEntry = dayEntries[dayEntries.length - 1];
  const target = {
    entryId: targetEntry?.id || null,
    createdAt: targetEntry?.created_at || null,
    dateKey: todayKey,
  };

  const { dayUserText, dayAiText } = buildDayPackText(dayEntries);

  await extractProfile(dayUserText, dayAiText, target);
  await generateDayTitle(todayGroup, target.entryId);
  await generateTomorrowHook(dayEntries, todayKey);
}

async function runAutoDayWrapIfNeeded() {
  if (State.streaming) return;

  const todayKey = getCurrentConversationDayKey();
  const todayGroup = State.historyGroups.find((g) => g.dateKey === todayKey);
  if (todayGroup && todayGroup.entries.length > 0) return;

  const latestPastGroup = State.historyGroups.find((g) => g.dateKey !== todayKey);
  if (!latestPastGroup || !latestPastGroup.entries.length) return;

  const dayEntries = getAnalyzableDayEntries(latestPastGroup.entries);
  if (!dayEntries.length) return;

  const alreadyPacked = dayEntries.some((e) => {
    const hasTitle = String(e.day_title || '').trim().length > 0;
    const hasSignal = String(e.emotional_signal || '').trim().length > 0;
    const hasSnapshot = !!e.profile_snapshot;
    return hasTitle || hasSignal || hasSnapshot;
  });
  if (alreadyPacked) return;

  const targetEntry = dayEntries[dayEntries.length - 1];
  const target = {
    entryId: targetEntry?.id || null,
    createdAt: targetEntry?.created_at || null,
    dateKey: latestPastGroup.dateKey,
  };
  const { dayUserText, dayAiText } = buildDayPackText(dayEntries);

  await extractProfile(dayUserText, dayAiText, target);
  await generateDayTitle(latestPastGroup, target.entryId);
  await generateTomorrowHook(dayEntries, latestPastGroup.dateKey);
  await updateHistoryListOnly();
}

let dayWrapPendingCount = 0;
let dayClosureInFlight = false;

function setDayWrapPending(delta) {
  dayWrapPendingCount = Math.max(0, dayWrapPendingCount + delta);
}

function playDayWrapCurtain() {
  if (!dayWrapCurtain) return;
  dayWrapCurtain.classList.remove('show');
  // Force reflow so repeated day-wraps can replay the animation.
  void dayWrapCurtain.offsetWidth;
  dayWrapCurtain.classList.add('show');
  setTimeout(() => {
    dayWrapCurtain.classList.remove('show');
  }, 3050);
}

window.addEventListener('beforeunload', (e) => {
  if (dayWrapPendingCount <= 0) return;
  e.preventDefault();
  e.returnValue = '';
});

async function withDayWrapGuard(task) {
  setDayWrapPending(1);
  playDayWrapCurtain();
  try {
    await task();
  } finally {
    setDayWrapPending(-1);
  }
}

async function finalizeDayClosure(endingText) {
  if (dayClosureInFlight) return;
  dayClosureInFlight = true;

  try {
    const todayKey = getCurrentConversationDayKey();
    const nowIso = new Date().toISOString();
    const finalText = String(endingText || '').trim() || u().bye;
    let wrote = false;

    try {
      const entries = JSON.parse(localStorage.getItem('undertow_entries') || '[]');
      if (!Array.isArray(entries)) return;

      // Idempotent guard: prevent duplicate day-end marker writes for the same day.
      if (hasDayEndMarker(entries, todayKey)) {
        return;
      }

      entries.push({
        id: crypto.randomUUID(),
        user_id: State.userId,
        content: '[今天到这里]',
        ai_response: finalText,
        day_number: State.dayNumber,
        created_at: nowIso,
        conversation_day_key: todayKey,
        emotional_signal: 'end_of_day',
        day_title: null,
        profile_snapshot: null,
      });
      localStorage.setItem('undertow_entries', JSON.stringify(entries));
      markConversationActivity();
      wrote = true;
    } catch {}

    if (wrote) {
      await checkAndDissolveMemory();
      await updateHistoryListOnly();
      await runEndOfDayAnalysis('[今天到这里]');
      await checkAndDissolveMemory();
    }
  } finally {
    dayClosureInFlight = false;
  }
}

    if (typeof closeHistoryDrawer === 'function') closeHistoryDrawer();
  }
});

profileDrawerBackdrop?.addEventListener('click', () => {
  profileDrawer.classList.remove('open');
});
/* ════════════════════════════════════════════════════════════
   SEND MESSAGE
════════════════════════════════════════════════════════════ */
const DECISION_RE = /要不要|该不该|纠结|选择|决定/i;
const ENDING_RE = /今天就到这里|到这里吧|就聊到这|晚安|要睡了|累了|先这样|拜拜/i;

async function generateEndingReview(todayGroup) {
  State.streaming = true;
  sendBtn.disabled = true;
  userInput.disabled = true;

  const todayConversation = getAnalyzableDayEntries(todayGroup?.entries || [])
    .map((e) => `用户：${e.content || ''}\n暗流：${e.ai_response || '—'}`)
    .join('\n\n');

  const bubble = document.createElement('div');
  bubble.className = 'msg ai ending-review';
  bubble.style.opacity = '1';
  bubble.innerHTML = `
    <div class="msg-label ending-review-label">
      今日沉淀
    </div>
    <div class="msg-bubble ending-review-bubble" id="streamBubble">
      <span class="cursor-blink"></span>
    </div>
  `;
  chatArea.appendChild(bubble);
  chatArea.scrollTop = chatArea.scrollHeight;

  const streamBubble = bubble.querySelector('#streamBubble');
  if (!streamBubble) {
    State.streaming = false;
    sendBtn.disabled = false;
    userInput.disabled = false;
    userInput.focus();
    return;
  }
  let full = '';

  const sys = `
你是「暗流」。用户今天结束对话了，你要给今天一个收尾。

今天说了这些：
${todayConversation}

要求：
——不是总结，不是复述。
——找到今天对话里最有重量的一个东西——
  一个转变，一个还没说完的东西，一个刚刚浮出来的认知。
——可以点出今天和以前某次对话的联系，
  如果你觉得有的话。
——结尾可以是一句话，放在那里，不问问题。
  也可以是一个轻轻的期待，比如：
  「明天，或许会有一个答案。」
——字数：60到100字。
——禁止说：「今天很充实」「你很勇敢」
  「明天会更好」「感谢你的分享」
——语气：像深夜里，
  有人帮你把今天的事情轻轻叠好，放在桌上。
`;

  try {
    await streamClaude(
      sys,
      [{ role: 'user', content: '今天就到这里了。' }],
      (chunk) => {
        full += chunk;
        appendToAIBubble(streamBubble, chunk);
      },
      async (fullText) => {
        finishAIBubble(streamBubble);
        await withDayWrapGuard(async () => {
          await finalizeDayClosure(fullText);
        });
      }
    );
  } catch {
    finishAIBubble(streamBubble);
  } finally {
    State.streaming = false;
    sendBtn.disabled = false;
    userInput.disabled = false;
    userInput.focus();
  }
}

async function handleSend() {
  const text = userInput.value.trim();
  if (!text || State.streaming) return;

  createRipple(document.querySelector('.send-btn-wrap'));
  markConversationActivity();

  await runAutoDayWrapIfNeeded();

  const todayKey = getCurrentConversationDayKey();
  const switchedFromHistoryDay = State.activeHistoryDay && State.activeHistoryDay !== todayKey;
  // Lock today's key during sending so activeHistoryDay does not switch mid-stream.
  State.activeHistoryDay = todayKey;
  State.manualHistoryView = false;
  if (switchedFromHistoryDay) {
    chatArea.innerHTML = '';
    for (const n of historyList.querySelectorAll('.history-card')) {
      n.classList.remove('active');
    }
  }

  // Decision detection
  const isDecision = DECISION_RE.test(text);
  const isEnding = ENDING_RE.test(text);
  if (isDecision) {
    State.pendingDecision = text;
  } else {
    State.pendingDecision = '';
  }

  if (isEnding) {
    addUserMsg(text);
    userInput.value = '';
    autoGrow();

    const todayKey = getCurrentConversationDayKey();
    const todayGroup = State.historyGroups
      .find(g => g.dateKey === todayKey);

    const alreadyClosed = !!(todayGroup &&
      todayGroup.entries.some(e => isEndOfDaySignal(e.content)));
    if (alreadyClosed) {
      const closedBubble = document.createElement('div');
      closedBubble.className = 'msg ai';
      closedBubble.innerHTML = `
        <div class="msg-label">暗流</div>
        <div class="msg-bubble">${escapeHtml(u().alreadyClosed)}</div>`;
      chatArea.appendChild(closedBubble);
      chatArea.scrollTop = chatArea.scrollHeight;
      return;
    }

    const hasContent = todayGroup &&
      todayGroup.entries.filter(e =>
        e.content !== '[今天到这里]'
      ).length > 0;

    State.streaming = true;
    sendBtn.disabled = true;
    userInput.disabled = true;

    // 第一条：正常的晚安回应
    const firstBubble = createAIBubble();
    const goodnight = u().goodnight;

    for (const ch of goodnight) {
      appendToAIBubble(firstBubble, ch);
      await new Promise(r => setTimeout(r, 35));
    }
    finishAIBubble(firstBubble);

    if (!hasContent) {
      State.streaming = false;
      sendBtn.disabled = false;
      userInput.disabled = false;
      return;
    }

    // 停顿 1.8 秒，制造"发现了什么"的感觉
    await new Promise(r => setTimeout(r, 1800));

    // 第二条：彩蛋消息
    const eggBubble = document.createElement('div');
    eggBubble.className = 'msg ai ending-egg';
    eggBubble.style.opacity = '0';
    eggBubble.style.transition = 'opacity 0.8s ease';

    const eggText = u().eggText;

    eggBubble.innerHTML = `
      <div class="msg-label" style="color:rgba(100,155,220,0.4);
           font-size:0.62rem;letter-spacing:0.25em;">
        ${u().noticedLabel}
      </div>
      <div class="msg-bubble ending-egg-bubble">
        ${escapeHtml(eggText)}
      </div>
      <div class="ending-actions">
        <button class="ending-btn" id="endingYes">
          ${u().surfaceBtn}
        </button>
        <button class="ending-btn ending-btn-skip" id="endingNo">
          ${u().skipBtn}
        </button>
      </div>
    `;

    chatArea.appendChild(eggBubble);
    chatArea.scrollTop = chatArea.scrollHeight;

    // 淡入
    requestAnimationFrame(() => {
      setTimeout(() => { eggBubble.style.opacity = '1'; }, 30);
    });

    document.getElementById('endingYes')?.addEventListener('click', async () => {
      eggBubble.querySelector('.ending-actions')?.remove();
      await generateEndingReview(todayGroup);
    });

    document.getElementById('endingNo')?.addEventListener('click', () => {
      eggBubble.querySelector('.ending-actions')?.remove();
      const byeBubble = document.createElement('div');
      byeBubble.className = 'msg ai';
      byeBubble.innerHTML = `
        <div class="msg-label">暗流</div>
        <div class="msg-bubble">${escapeHtml(u().bye)}</div>`;
      chatArea.appendChild(byeBubble);
      chatArea.scrollTop = chatArea.scrollHeight;
      void withDayWrapGuard(async () => {
        await finalizeDayClosure(u().bye);
      });
    });

    State.streaming = false;
    sendBtn.disabled = false;
    userInput.disabled = false;
    return;
  }

  addUserMsg(text);
  userInput.value = '';
  autoGrow();
  State.streaming = true;
  sendBtn.disabled = true;
  userInput.disabled = true;
  const bubble = createAIBubble();
  let fullResponse = '';
  try {
    const sys = await buildSystemPrompt();
    const messages = await buildTodayMessages(text);
    await streamClaude(sys, messages,
      (chunk) => {
        fullResponse += chunk;
        appendToAIBubble(bubble, chunk);
      },
      async (full) => {
        fullResponse = full;
        finishAIBubble(bubble);
        const entryId = await saveEntry(text, full);
        await updateHistoryListOnly();
        const totalTurns = State.historyGroups
          .flatMap((g) => g.entries || [])
          .filter((e) => {
            const content = String(e?.content || '').trim();
            return content && content !== '[今天到这里]';
          }).length;
        if (entryId && totalTurns > 0 && totalTurns % 5 === 0) {
          void extractProfile(text, full, { entryId });
        }
        void generateDayTitle(
          State.historyGroups.find(g =>
            g.dateKey === getCurrentConversationDayKey()
          ),
          entryId
        );
        await runEndOfDayAnalysis(text);

        if (State.dayNumber === 10) {
          setTimeout(() => {
            showPhaseTransition('seeing');
          }, 2000);
          State.phase = 'seeing';
          localStorage.setItem('undertow_phase', 'seeing');
        }

        if (State.dayNumber === 22) {
          setTimeout(() => {
            showPhaseTransition('simulating');
          }, 2000);
          State.phase = 'simulating';
          localStorage.setItem('undertow_phase', 'simulating');
        }
      }
    );
  } catch (err) {
    finishAIBubble(bubble);
    addErrorMsg(`${t().errorMsg} ${err?.message ? `(${err.message})` : ''}`.trim());
    console.error(err);
  } finally {
    State.streaming = false;
    sendBtn.disabled = false;
    userInput.disabled = false;
    userInput.focus();
  }
}

sendBtn.addEventListener('click', handleSend);
userInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSend(); }
});
/* ════════════════════════════════════════════════════════════
   HISTORY SIDEBAR (mobile toggle)
════════════════════════════════════════════════════════════ */
historyBtn.addEventListener('click', () => {
  if (window.innerWidth <= 768) {
    // 手机端：优先用 historyDrawer，没有就用 sidebar-open
    const historyDrawer = document.getElementById('historyDrawer');
    if (historyDrawer) {
      const isOpen = historyDrawer.classList.contains('open');
      if (isOpen) {
        historyDrawer.classList.remove('open');
        historyDrawer.style.transform = 'translateX(-100%)';
        const overlay = document.getElementById('historyDrawerOverlay');
        if (overlay) {
          overlay.style.opacity = '0';
          overlay.style.pointerEvents = 'none';
        }
      } else {
        historyDrawer.classList.add('open');
        historyDrawer.style.transform = 'translateX(0)';
        const overlay = document.getElementById('historyDrawerOverlay');
        if (overlay) {
          overlay.style.opacity = '1';
          overlay.style.pointerEvents = 'auto';
        }
      }
    } else {
      document.body.classList.toggle('sidebar-open');
    }
  } else {
    // 桌面端不做任何事，sidebar 一直可见
  }
});
document.addEventListener('click', (e) => {
  if (window.innerWidth > 768) return;
  if (!document.body.classList.contains('sidebar-open')) return;
  const sidebar = $('sidebar');
  if (!sidebar) return;
  // 点击了 sidebar 内部的任何元素，不关闭
  if (sidebar.contains(e.target)) return;
  // 点击了 historyBtn，不关闭
  if (e.target === historyBtn) return;
  // 其他地方关闭
  document.body.classList.remove('sidebar-open');
});
/* ════════════════════════════════════════════════════════════
   INTRO → APP TRANSITION
════════════════════════════════════════════════════════════ */
function startApp() {
  if (introScreen.classList.contains('hidden')) return;
  introScreen.classList.add('hidden');
  appScreen.classList.remove('hidden');
  exitSealedMode();
  userInput.focus();
}
beginBtn.addEventListener('click', startApp);
beginBtn.addEventListener('touchend', startApp, { passive: true });
/* ════════════════════════════════════════════════════════════
   INIT
════════════════════════════════════════════════════════════ */
async function init() {
  applyLang();
  autoGrow();
  getCurrentConversationDayKey();

  // 计算天数（以首次相遇日期为准）
  State.dayNumber = getDayNumberFromEntries();
  dayBadge.textContent = t().dayLabel(State.dayNumber);

  await renderHistory();
  await runAutoDayWrapIfNeeded();

  // 检查今天是否已经有记录
  const todayKey = getCurrentConversationDayKey();
  const todayGroup = State.historyGroups.find(g => g.dateKey === todayKey);
  const hasTodayEntry = !!(todayGroup &&
    todayGroup.entries.filter(e => e.content !== '[今天到这里]').length > 0);

  if (!hasTodayEntry) {
    await showDailyOpening();
  } else {
    renderDayMessages(todayGroup);
    exitSealedMode();
  }

  if (State.dayNumber >= 21 && !State.day21Shown) {
    setTimeout(showDay21, 1200);
  }
}
init();
</script>
